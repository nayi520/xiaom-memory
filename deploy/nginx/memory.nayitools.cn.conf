# =============================================================================
# 小M (Memory) · Nginx 站点配置 —— memory.nayitools.cn
# =============================================================================
# 反向代理到本机 Next.js (standalone + pm2)。
#
# 【与现有站点完全隔离】本文件只声明 server_name memory.nayitools.cn，
#   不碰 growth.nayitools.cn / okr.nayitools.cn 的任何配置或端口：
#   - 上游端口用 3100（避开它们各自的端口；Next standalone 默认 3000 也避开）。
#   - 放置方式见下方「安装」，只新增一个独立文件，不改 nginx.conf / 现有 vhost。
#
# 【占位/需替换】部署时按注释把以下占位改成真实值：
#   - ssl_certificate / ssl_certificate_key 路径（certbot 申请后会给出实际路径）。
#   - 若用阿里云证书而非 Let's Encrypt，把两行 ssl_* 换成阿里云下载的 .pem / .key。
#
# 【安装】(均在 ECS 上，sudo)
#   sudo cp deploy/nginx/memory.nayitools.cn.conf /etc/nginx/sites-available/memory.nayitools.cn.conf
#   sudo ln -s /etc/nginx/sites-available/memory.nayitools.cn.conf \
#              /etc/nginx/sites-enabled/memory.nayitools.cn.conf
#   sudo nginx -t        # 必须先测试，确认不影响 growth/okr
#   sudo systemctl reload nginx
#
# 【首次申请证书的顺序】先只放下面的「HTTP(80) server」块（注释掉 443 块），
#   reload 后跑 certbot（见 DEPLOY.md），certbot 会自动补好 443 与证书路径；
#   或手动启用本文件的 443 块并填入路径。
# =============================================================================

# ---- WebSocket 升级映射 -----------------------------------------------------
# $connection_upgrade 必须在使用它的 server 块之前定义。
# 【可能冲突】若你的 nginx.conf 或某个 conf.d/*.conf 已定义过同名 map（growth/okr
#   的配置里可能有），nginx -t 会报 "duplicate ... $connection_upgrade"。
#   届时删掉本 map 块即可（复用已有的那个），server 块逻辑不受影响。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- 上游：本机 Next.js standalone（pm2 守护，监听 127.0.0.1:3100）-----------
upstream xiaom_memory_upstream {
    server 127.0.0.1:3100;
    keepalive 32;
}

# ---- HTTP(80)：仅用于 ACME 验证 + 整站 301 跳 HTTPS ------------------------
server {
    listen 80;
    listen [::]:80;
    server_name memory.nayitools.cn;

    # Let's Encrypt webroot 验证（certbot --webroot 时用；certbot --nginx 会自行处理可不依赖此项）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # 其余一律跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS(443)：主服务 ----------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name memory.nayitools.cn;

    # ===== 证书（占位，按实际替换）==========================================
    # Let's Encrypt（certbot 申请后路径形如下；域名目录名以 certbot 输出为准）：
    ssl_certificate     /etc/letsencrypt/live/memory.nayitools.cn/fullchain.pem;   # ← 替换/由 certbot 写入
    ssl_certificate_key /etc/letsencrypt/live/memory.nayitools.cn/privkey.pem;     # ← 替换/由 certbot 写入
    # 阿里云证书改用（示例）：
    #   ssl_certificate     /etc/nginx/ssl/memory.nayitools.cn/server.pem;
    #   ssl_certificate_key /etc/nginx/ssl/memory.nayitools.cn/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL_memory:10m;   # 命名带 _memory 避免与其它 vhost 的 shared zone 撞名
    ssl_session_timeout 1d;

    # 安全响应头（仅本站，不影响其它 vhost）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== 上传体积：语音记录会 POST 音频，放宽 body 上限 ====================
    # 会议记录（长录音，~1-2 小时）可达数十~上百 MB → 设 200m（须 ≥ 应用层 MAX_AUDIO_BYTES=100m，
    # 让超限由应用返回友好 JSON 413，而非 nginx 的 HTML 413）。原 50m 会把 1 小时录音卡掉。
    client_max_body_size 200m;
    client_body_buffer_size 1m;
    # 大文件慢网上传：读 client body 给足时间（默认 60s 对几十 MB 上行偏短）。
    client_body_timeout 300s;

    # ===== gzip ============================================================
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml
        font/ttf font/otf application/font-woff application/font-woff2;
    # 注：Next 的 .js/.css 资源 content-type 多为 application/javascript / text/css，已覆盖。

    # ===== Next.js 静态资源：长缓存（带内容哈希，可安全 immutable）==========
    location /_next/static/ {
        proxy_pass http://xiaom_memory_upstream;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # public/ 下的静态文件（图标、manifest、sw.js）：中等缓存
    # 注意 sw.js 不宜长缓存（Service Worker 更新），单独短缓存。
    location = /sw.js {
        proxy_pass http://xiaom_memory_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }
    location = /manifest.json {
        proxy_pass http://xiaom_memory_upstream;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    location /icons/ {
        proxy_pass http://xiaom_memory_upstream;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ===== 应用主体：反代到 Next standalone ================================
    location / {
        proxy_pass http://xiaom_memory_upstream;
        proxy_http_version 1.1;

        # 标准转发头（Next 读取以构造绝对 URL / 识别协议）
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HMR 兼容（生产一般用不到，留着无害）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 上游空闲连接保持
        proxy_set_header Connection "";

        # 超时：cron/digest 走的是系统 crontab→curl（不经此 vhost），
        # 但 LLM 整理等接口可能较慢，给足读超时。
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering on;
    }
}
